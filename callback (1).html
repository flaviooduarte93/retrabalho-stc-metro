<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0D47A1"/>
  <title>Call-Back — Equatorial Retrabalho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="inner-page">
  <nav class="topbar">
    <div class="topbar-brand">
      <span class="brand-title">eq<span>ua</span>torial</span>
      <span class="topbar-badge">Retrabalho</span>
    </div>
    <div class="topbar-nav">
      <a href="index.html" class="topbar-navitem">Início</a>
      <span class="topbar-navsep">›</span>
      <span class="topbar-navitem topbar-navitem--current">Call-Back</span>
    </div>
  </nav>

  <main class="page-main">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:4px">
      <div>
        <h1 class="page-title" style="margin-bottom:0">Sugestão de Call-Back</h1>
        <p class="page-subtitle">UCs com últimos atendimentos improcedentes — candidatas a retorno ativo.</p>
      </div>
      <button class="search-btn" id="btn-refresh" style="padding:10px 20px;font-size:0.85rem">↻ Atualizar</button>
    </div>

    <div id="stats-container"></div>

    <div class="historico-toolbar" style="margin-bottom:16px">
      <div class="filtro-uc-wrap">
        <svg class="filtro-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.6"/>
          <line x1="11" y1="11" x2="15" y2="15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input id="filtro-uc" type="text" class="filtro-uc-input" placeholder="Buscar UC..." oninput="filtrarUC(this.value)" autocomplete="off"/>
        <button class="filtro-clear" id="filtro-clear" onclick="limparFiltro()" style="display:none">✕</button>
        <span class="filtro-count" id="filtro-count"></span>
      </div>
      <div class="sort-group">
        <span class="sort-label">Ordenar:</span>
        <button id="sort-mais-imp" class="sort-btn sort-btn--active" onclick="ordenar('mais-imp')">↓ Mais improcedentes</button>
        <button id="sort-recente" class="sort-btn" onclick="ordenar('recente')">🕐 Mais recente</button>
        <button id="sort-uc" class="sort-btn" onclick="ordenar('uc')">🔢 UC</button>
      </div>
    </div>

    <div id="callback-container">
      <div class="loading-state"><div class="spinner"></div><br>Carregando...</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-init.js"></script>
  <script src="causas-improcedentes.js"></script>
  <script src="callback.js"></script>
</body>
</html>
