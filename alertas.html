<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="theme-color" content="#0D47A1"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Alertas de Campo — Equatorial Retrabalho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="inner-page">

  <nav class="topbar">
    <div class="topbar-brand">
      <span class="brand-title">eq<span>ua</span>torial</span>
      <span class="topbar-badge">Retrabalho</span>
    </div>
    <div class="topbar-nav">
      <a href="index.html" class="topbar-navitem">Início</a>
      <span class="topbar-navsep">›</span>
      <span class="topbar-navitem topbar-navitem--current">Alertas</span>
    </div>
  </nav>

  <main class="page-main">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:4px">
      <h1 class="page-title" style="margin-bottom:0">Alertas de Campo</h1>
      <button class="search-btn" id="btn-refresh" style="padding:10px 20px;font-size:0.85rem">↻ Atualizar</button>
    </div>
    <p class="page-subtitle">Ocorrências ativas classificadas por risco de retrabalho.</p>

    <div id="stats-container"></div>

    <!-- Seletor de visão -->
    <div class="visao-selector">
      <button id="visao-retrabalho" class="visao-btn visao-btn--active visao-btn--danger" onclick="mudarVisao('retrabalho')">
        🔴 Retrabalho Confirmado
      </button>
      <button id="visao-possivel" class="visao-btn visao-btn--warning" onclick="mudarVisao('possivel')">
        ⚠ Possível Retrabalho
      </button>
      <button id="visao-primeiro" class="visao-btn visao-btn--success" onclick="mudarVisao('primeiro')">
        🟢 Primeiro Atendimento
      </button>
    </div>

    <div id="alertas-container"></div>
    <div id="historico-container"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-init.js"></script>
  <script src="causas-improcedentes.js"></script>
  <script src="alertas.js"></script>
</body>
</html>
